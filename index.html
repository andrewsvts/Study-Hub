<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Local Revision Hub & AI Assistant</title>
    <link rel="stylesheet" href="css/styles.css" />
    <script defer src="js/app.js"></script>
  </head>
  <body>
    <div class="app-container">
      <aside class="sidebar">
        <div class="sidebar-brand">
          <h2>StudyHub.ai</h2>
        </div>
        <nav class="sidebar-nav">
          <ul>
            <li><a href="#" class="active">Workspace</a></li>
            <li><a href="#">Analytics</a></li>
            <li><a href="#">Settings</a></li>
          </ul>
        </nav>
        <div class="sidebar-status">
          <span class="status-dot connected"></span>
          <span>Local AI Ready</span>
        </div>
      </aside>

      <main class="main-content">
        <section class="metrics-dashboard">
          <div class="card">
            <h3>Focus Time</h3>
            <p class="value" id="stat-time">0h 0m</p>
          </div>
          <div class="card">
            <h3>Mastery Score</h3>
            <p class="value" id="stat-mastery">0%</p>
          </div>
          <div class="card">
            <h3>AI Queries</h3>
            <p class="value" id="stat-queries">0</p>
          </div>
        </section>

        <section class="workspace">
          <div class="chat-display" id="chat-box">
            <div class="msg system">
              <strong>System:</strong> Welcome back. Enter a query below to
              prompt your local on-device model.
            </div>
          </div>

          <div class="chat-input-area">
            <form id="chat-form">
              <input
                type="text"
                id="user-input"
                placeholder="Ask your local study agent..."
                required
                autocomplete="off"
              />
              <button type="submit">Send</button>
            </form>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
